<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPay - লগইন ও স্পিন</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --white: #ffffff; --text: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--bg); color: var(--text); }

        /* Login Screen Styles */
        #loginScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-box { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        .login-box h2 { text-align: center; margin-bottom: 25px; color: var(--primary); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 16px; outline: none; }
        .login-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; }

        /* Spin Screen Styles */
        #spinScreen { display: none; }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .wallet-card { background: var(--white); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .wallet-card h3 { font-size: 14px; color: #64748b; }
        .wallet-card .balance { font-size: 30px; font-weight: 800; color: var(--primary); }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .status-box { background: var(--white); padding: 15px; border-radius: 15px; text-align: center; }
        .status-box p { font-weight: 700; color: var(--primary); }

        .wheel-container { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 5; color: #ef4444; font-size: 35px; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 6px solid white; box-shadow: 0 0 20px rgba(0,0,0,0.1); transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(#f87171 0 60deg, #fbbf24 60deg 120deg, #34d399 120deg 180deg, #60a5fa 180deg 240deg, #a78bfa 240deg 300deg, #f472b6 300deg 360deg); }
        .wheel-labels { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .label { position: absolute; top: 0; left: 50%; width: 50px; height: 50%; transform-origin: 50% 100%; text-align: center; padding-top: 15px; font-weight: 800; color: white; margin-left: -25px; }

        .spin-btn { width: 100%; padding: 15px; border-radius: 12px; background: var(--primary); color: white; border: none; font-size: 20px; font-weight: 700; cursor: pointer; box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3); }
        .spin-btn:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; }

        .history-card { margin-top: 25px; background: var(--white); padding: 15px; border-radius: 15px; }
        .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #f1f5f9; font-size: 14px; }
        
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #334155; color: white; padding: 10px 20px; border-radius: 30px; transition: 0.4s; opacity: 0; z-index: 100; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2>লগইন করুন</h2>
            <div class="input-group">
                <label>ইমেইল অ্যাড্রেস</label>
                <input type="email" id="loginEmail" placeholder="example@mail.com">
            </div>
            <div class="input-group">
                <label>পাসওয়ার্ড</label>
                <input type="password" id="loginPass" placeholder="******">
            </div>
            <button class="login-btn" onclick="handleLogin()">লগইন</button>
        </div>
    </div>

    <div id="spinScreen">
        <div class="container">
            <div class="wallet-card">
                <h3>স্পিন ওয়ালেট ব্যালেন্স</h3>
                <div class="balance">৳<span id="spinBal">0.00</span></div>
            </div>

            <div class="status-grid">
                <div class="status-box">
                    <h3>আজকের স্পিন</h3>
                    <p><span id="countToday">0</span> / <span id="limitTotal">0</span></p>
                </div>
                <div class="status-box">
                    <h3>পরবর্তী স্পিন</h3>
                    <p id="timerText">প্রস্তুত</p>
                </div>
            </div>

            <div class="wheel-container">
                <div class="pointer"><i class="fa-solid fa-caret-down"></i></div>
                <div class="wheel" id="wheel">
                    <div class="wheel-labels" id="wheelLabels"></div>
                </div>
            </div>

            <button id="spinBtn" class="spin-btn" onclick="startSpinAction()">স্পিন করুন</button>

            <div class="history-card">
                <h2 style="font-size: 16px; margin-bottom: 10px;">সাম্প্রতিক হিস্ট্রি</h2>
                <div id="historyList"></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBY2R6jBre2pjrW3cN0QP8LGrLldgKWEtc",
            authDomain: "smartpay-4cae4.firebaseapp.com",
            projectId: "smartpay-4cae4",
            storageBucket: "smartpay-4cae4.firebasestorage.app",
            messagingSenderId: "531344716314",
            appId: "1:531344716314:web:0eac7f60479bfd66f7d7a3"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let uid = null, config = null, isSpinning = false, lastSpin = null, todayCount = 0;

        // Auth Logic
        auth.onAuthStateChanged(user => {
            if (user) {
                uid = user.uid;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('spinScreen').style.display = 'block';
                initApp();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('spinScreen').style.display = 'none';
            }
        });

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            if(!email || !pass) return showToast("সব তথ্য দিন");
            
            auth.signInWithEmailAndPassword(email, pass)
                .catch(err => showToast("লগইন ব্যর্থ: তথ্য চেক করুন"));
        }

        function handleLogout() { auth.signOut(); }

        // App Logic
        async function initApp() {
            db.collection('spin_settings').doc('config').onSnapshot(doc => {
                config = doc.data();
                renderLabels();
                syncData();
            });
        }

        function renderLabels() {
            const container = document.getElementById('wheelLabels');
            container.innerHTML = '';
            config.wheel.boxes.forEach((box, i) => {
                const deg = (i * 60) + 30;
                container.innerHTML += `<div class="label" style="transform: rotate(${deg}deg)">৳${box.amount}</div>`;
            });
        }

        function syncData() {
            // Balance
            db.collection('users').doc(uid).onSnapshot(doc => {
                const data = doc.data() || {};
                document.getElementById('spinBal').innerText = (data.spinWallet || 0).toFixed(2);
            });

            // History
            const startOfToday = new Date(); startOfToday.setHours(0,0,0,0);
            db.collection('users').doc(uid).collection('spin_history')
              .orderBy('createdAt', 'desc').onSnapshot(snap => {
                  let html = '', count = 0;
                  if (!snap.empty) lastSpin = snap.docs[0].data().createdAt?.toDate();
                  snap.forEach(doc => {
                      const d = doc.data();
                      const date = d.createdAt?.toDate() || new Date();
                      if (date >= startOfToday) count++;
                      html += `<div class="history-item"><span>বক্স ${d.boxIndex}</span><span style="color:#10b981; font-weight:700">+৳${d.amount}</span></div>`;
                  });
                  todayCount = count;
                  document.getElementById('countToday').innerText = count;
                  document.getElementById('historyList').innerHTML = html || '<p style="text-align:center;">রেকর্ড নেই</p>';
                  checkConstraints();
              });
        }

        function checkConstraints() {
            if (isSpinning) return;
            const btn = document.getElementById('spinBtn');
            document.getElementById('limitTotal').innerText = config.dailyLimit;

            if (!config.isActive) { btn.disabled = true; btn.innerText = "মেইনটেন্যান্স"; return; }
            if (todayCount >= config.dailyLimit) { btn.disabled = true; btn.innerText = "লিমিট শেষ"; return; }

            if (lastSpin) {
                const wait = config.spinIntervalHours * 3600000;
                const next = lastSpin.getTime() + wait;
                const diff = next - Date.now();
                if (diff > 0) { btn.disabled = true; startTimer(next); return; }
            }
            btn.disabled = false; btn.innerText = "স্পিন করুন";
            document.getElementById('timerText').innerText = "প্রস্তুত";
        }

        function startTimer(target) {
            const itv = setInterval(() => {
                const diff = target - Date.now();
                if (diff <= 0) { clearInterval(itv); checkConstraints(); }
                else {
                    const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                    document.getElementById('timerText').innerText = `${h}ঘ ${m}মি ${s}সে`;
                }
            }, 1000);
        }

        async function startSpinAction() {
            if (isSpinning) return;
            isSpinning = true; document.getElementById('spinBtn').disabled = true;

            const rand = Math.random() * 100;
            let cumulative = 0, winner = config.wheel.boxes[0];
            for (let box of config.wheel.boxes) {
                cumulative += box.probability;
                if (rand < cumulative) { winner = box; break; }
            }

            const boxIdx = winner.index - 1;
            const totalDeg = (360 * 5) + (360 - (boxIdx * 60)) - 30;
            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${totalDeg}deg)`;

            setTimeout(async () => {
                await processReward(winner);
                showToast(`অভিনন্দন! আপনি জিতেছেন ৳${winner.amount}`);
                isSpinning = false;
                wheel.style.transition = 'none';
                wheel.style.transform = `rotate(${totalDeg % 360}deg)`;
                setTimeout(() => wheel.style.transition = 'transform 4s cubic-bezier(0.15, 0, 0.15, 1)', 50);
            }, 4200);
        }

        async function processReward(box) {
            const userRef = db.collection('users').doc(uid);
            const histRef = userRef.collection('spin_history').doc();
            await db.runTransaction(async (t) => {
                const doc = await t.get(userRef);
                const curBal = (doc.exists ? doc.data().spinWallet : 0) || 0;
                t.set(userRef, { spinWallet: curBal + box.amount }, { merge: true });
                t.set(histRef, { boxIndex: box.index, amount: box.amount, probability: box.probability, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            });
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
