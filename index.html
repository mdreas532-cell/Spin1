<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPay - লাকি স্পিন</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --white: #ffffff; --text: #0f172a; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Login Screen */
        #loginScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-box { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        .login-box h2 { text-align: center; margin-bottom: 25px; color: var(--primary); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 16px; outline: none; }
        .login-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: 700; cursor: pointer; }

        /* Spin Screen */
        #spinScreen { display: none; }

        /* Top User Bar */
        .top-user-bar { background: var(--white); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .user-meta { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: #64748b; }
        .btn-logout { background: #fee2e2; color: var(--danger); border: 1px solid #fecaca; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; }

        /* Marquee */
        .marquee-container { background: #1e293b; color: #fbbf24; padding: 8px 15px; font-size: 13px; display: flex; align-items: center; overflow: hidden; white-space: nowrap; }
        .marquee-content { display: inline-block; animation: scrollText 15s linear infinite; }
        @keyframes scrollText { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .wallet-card { background: var(--white); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); border: 1px solid #edf2f7; }
        .balance { font-size: 32px; font-weight: 800; color: var(--primary); }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .status-box { background: var(--white); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #edf2f7; }
        .status-box h4 { font-size: 11px; color: #94a3b8; margin-bottom: 5px; }
        .status-box p { font-weight: 700; font-size: 15px; }

        /* Wheel UI */
        .wheel-container { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 5; color: #ef4444; font-size: 35px; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 6px solid white; box-shadow: 0 0 20px rgba(0,0,0,0.1); transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(#f87171 0 60deg, #fbbf24 60deg 120deg, #34d399 120deg 180deg, #60a5fa 180deg 240deg, #a78bfa 240deg 300deg, #f472b6 300deg 360deg); }
        .wheel-labels { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .label { position: absolute; top: 0; left: 50%; width: 50px; height: 50%; transform-origin: 50% 100%; text-align: center; padding-top: 15px; font-weight: 800; color: white; margin-left: -25px; }

        .spin-btn { width: 100%; padding: 16px; border-radius: 12px; background: var(--primary); color: white; border: none; font-size: 18px; font-weight: 700; cursor: pointer; }
        .spin-btn:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* History */
        .history-card { margin-top: 30px; background: var(--white); padding: 15px; border-radius: 15px; border: 1px solid #edf2f7; }
        .history-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px dashed #e2e8f0; }
        .serial-badge { background: var(--primary); color: white; min-width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        .history-info { flex-grow: 1; margin: 0 12px; }
        .history-time { font-size: 11px; color: #64748b; margin-top: 2px; display: block; }
        .history-amount { font-weight: 800; color: #10b981; }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #334155; color: white; padding: 12px 25px; border-radius: 30px; transition: 0.4s; opacity: 0; z-index: 1000; font-size: 14px; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2>লগইন প্যানেল</h2>
            <div class="input-group">
                <label>ইমেইল অ্যাড্রেস</label>
                <input type="email" id="loginEmail" placeholder="আপনার ইমেইল">
            </div>
            <div class="input-group">
                <label>পাসওয়ার্ড</label>
                <input type="password" id="loginPass" placeholder="******">
            </div>
            <button class="login-btn" id="loginSubmitBtn" onclick="handleLogin()">লগইন করুন</button>
        </div>
    </div>

    <div id="spinScreen">
        <div class="top-user-bar">
            <div class="user-meta">
                <i class="fas fa-user-circle" style="color:var(--primary); font-size:18px;"></i>
                <span id="displayUserEmail">লোড হচ্ছে...</span>
            </div>
            <button class="btn-logout" onclick="handleLogout()">লগ আউট</button>
        </div>

        <div class="marquee-container">
            <span class="marquee-content" id="scrollingText">লোড হচ্ছে...</span>
        </div>

        <div class="container">
            <div class="wallet-card">
                <p style="font-size: 12px; color: #64748b;">ওয়ালেট ব্যালেন্স</p>
                <div class="balance">৳<span id="spinBal">0.00</span></div>
            </div>

            <div class="status-grid">
                <div class="status-box">
                    <h4>আজকের স্পিন</h4>
                    <p><span id="countToday">0</span> / <span id="limitTotal">0</span></p>
                </div>
                <div class="status-box">
                    <h4>পরবর্তী স্পিন</h4>
                    <p id="timerText">--:--</p>
                </div>
            </div>

            <div class="wheel-container">
                <div class="pointer"><i class="fa-solid fa-caret-down"></i></div>
                <div class="wheel" id="wheel">
                    <div class="wheel-labels" id="wheelLabels"></div>
                </div>
            </div>

            <button id="spinBtn" class="spin-btn" onclick="startSpinAction()">স্পিন করুন</button>

            <div class="history-card">
                <h3 style="font-size: 14px; margin-bottom: 10px; color: var(--primary);">সাম্প্রতিক স্পিন হিস্ট্রি</h3>
                <div id="historyList"></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBY2R6jBre2pjrW3cN0QP8LGrLldgKWEtc",
            authDomain: "smartpay-4cae4.firebaseapp.com",
            projectId: "smartpay-4cae4",
            storageBucket: "smartpay-4cae4.firebasestorage.app",
            messagingSenderId: "531344716314",
            appId: "1:531344716314:web:0eac7f60479bfd66f7d7a3"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let uid = null, config = null, isSpinning = false, lastSpin = null, todayCount = 0;

        auth.onAuthStateChanged(user => {
            if (user) {
                uid = user.uid;
                document.getElementById('displayUserEmail').innerText = user.email;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('spinScreen').style.display = 'block';
                initApp();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('spinScreen').style.display = 'none';
            }
        });

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            if(!email || !pass) return showToast("সব তথ্য দিন");
            auth.signInWithEmailAndPassword(email, pass).catch(() => showToast("লগইন ব্যর্থ!"));
        }

        function handleLogout() {
            if(confirm("আপনি কি লগ আউট করতে চান?")) auth.signOut();
        }

        async function initApp() {
            db.collection('spin_settings').doc('config').onSnapshot(doc => {
                config = doc.data();
                document.getElementById('scrollingText').innerText = config.scrollingText || "Welcome!";
                renderLabels();
                syncUserData();
            });
        }

        function renderLabels() {
            const container = document.getElementById('wheelLabels');
            container.innerHTML = '';
            config.wheel.boxes.forEach((box, i) => {
                const deg = (i * 60) + 30;
                container.innerHTML += `<div class="label" style="transform: rotate(${deg}deg)">৳${box.amount}</div>`;
            });
        }

        function syncUserData() {
            db.collection('users').doc(uid).onSnapshot(doc => {
                document.getElementById('spinBal').innerText = (doc.data()?.spinWallet || 0).toFixed(2);
            });

            const today = new Date(); today.setHours(0,0,0,0);
            db.collection('users').doc(uid).collection('spin_history').orderBy('createdAt', 'desc').onSnapshot(snap => {
                let html = '', count = 0, serial = 1;
                if (!snap.empty) lastSpin = snap.docs[0].data().createdAt?.toDate();
                snap.forEach(doc => {
                    const d = doc.data();
                    const date = d.createdAt?.toDate() || new Date();
                    if (date >= today) count++;
                    
                    // তারিখ এবং সময় ফরম্যাট (DD/MM/YYYY | HH:MM AM/PM)
                    const dateTimeStr = date.toLocaleString('en-GB', { 
                        timeZone: 'Asia/Dhaka', 
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit', hour12: true 
                    }).replace(',', ' |');

                    html += `<div class="history-item">
                        <div class="serial-badge">${serial++}</div>
                        <div class="history-info">
                            <b>বক্স ${d.boxIndex}</b>
                            <span class="history-time">${dateTimeStr}</span>
                        </div>
                        <div class="history-amount">+৳${d.amount}</div>
                    </div>`;
                });
                todayCount = count;
                document.getElementById('countToday').innerText = count;
                document.getElementById('historyList').innerHTML = html || '<p style="text-align:center; padding:10px; font-size:12px;">রেকর্ড নেই</p>';
                checkEligibility();
            });
        }

        function checkEligibility() {
            if (isSpinning) return;
            const btn = document.getElementById('spinBtn');
            document.getElementById('limitTotal').innerText = config.dailyLimit;
            if (!config.isActive) { btn.disabled = true; btn.innerText = "বন্ধ"; return; }
            if (todayCount >= config.dailyLimit) { btn.disabled = true; btn.innerText = "লিমিট শেষ"; return; }
            if (lastSpin) {
                const next = lastSpin.getTime() + (config.spinIntervalHours * 3600000);
                if (next > Date.now()) { btn.disabled = true; startTimer(next); return; }
            }
            btn.disabled = false; btn.innerText = "স্পিন করুন";
            document.getElementById('timerText').innerText = "প্রস্তুত";
        }

        function startTimer(target) {
            const itv = setInterval(() => {
                const diff = target - Date.now();
                if (diff <= 0) { clearInterval(itv); checkEligibility(); }
                else {
                    const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                    document.getElementById('timerText').innerText = `${h}h ${m}m ${s}s`;
                }
            }, 1000);
        }

        async function startSpinAction() {
            if (isSpinning) return;
            isSpinning = true; document.getElementById('spinBtn').disabled = true;
            const rand = Math.random() * 100;
            let cumulative = 0, winner = config.wheel.boxes[0];
            for (let box of config.wheel.boxes) {
                cumulative += box.probability;
                if (rand < cumulative) { winner = box; break; }
            }
            const totalDeg = (360 * 5) + (360 - ((winner.index-1) * 60)) - 30;
            document.getElementById('wheel').style.transform = `rotate(${totalDeg}deg)`;
            setTimeout(async () => {
                await processReward(winner);
                showToast(`জিতেছেন ৳${winner.amount}`);
                isSpinning = false;
                document.getElementById('wheel').style.transition = 'none';
                document.getElementById('wheel').style.transform = `rotate(${totalDeg % 360}deg)`;
                setTimeout(() => document.getElementById('wheel').style.transition = 'transform 4s cubic-bezier(0.15, 0, 0.15, 1)', 50);
            }, 4200);
        }

        async function processReward(box) {
            const userRef = db.collection('users').doc(uid);
            const histRef = userRef.collection('spin_history').doc();
            await db.runTransaction(async (t) => {
                const doc = await t.get(userRef);
                const curBal = (doc.exists ? doc.data().spinWallet : 0) || 0;
                t.set(userRef, { spinWallet: curBal + box.amount }, { merge: true });
                t.set(histRef, { boxIndex: box.index, amount: box.amount, probability: box.probability, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            });
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
